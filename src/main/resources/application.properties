spring.application.name=warehouse-management

server.port=8000

spring.datasource.url=jdbc:mysql://localhost:3306/logiTrack
spring.datasource.username=alexidg
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
logging.level.root=INFO
logging.level.com.proyectS1.warehouse_management=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

app.security.jwt.secret=warehouse-management-super-secret-jwt-key-2026
app.storage.profile-photos-dir=./uploads/profile-images

app.notifications.email.enabled=true
app.notifications.email.fail-on-error=false
app.notifications.email.provider=fastapi
app.notifications.email.fastapi.base-url=https://email-python-fast-api.vercel.app/
app.notifications.email.fastapi.send-path=/emails/send
