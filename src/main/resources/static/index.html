<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>logiTrack | Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-neutral-950 px-4 py-6 text-white sm:px-6 lg:px-8">
    <main class="mx-auto flex min-h-[calc(100vh-3rem)] w-full max-w-6xl items-center justify-center">
        <div class="grid w-full overflow-hidden rounded-[2rem] border border-white/10 bg-white/5 shadow-2xl shadow-black/40 backdrop-blur lg:grid-cols-[minmax(0,1fr)_24rem]">
        <section class="flex items-center justify-center px-5 py-8 sm:px-8 sm:py-10 lg:px-12">
            <div class="w-full max-w-md">
            <span class="mb-4 inline-flex rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-emerald-300">Warehouse Access</span>
            <h1 class="text-3xl font-black tracking-tight text-white sm:text-4xl">logiTrack | Login</h1>
            <p class="mt-3 text-sm leading-6 text-neutral-300 sm:text-base">Ingresa con tu correo y contraseña para acceder al sistema.</p>
            <form id="login-form" action="" method="post" novalidate>
                <div class="mt-8 space-y-5">
                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium text-neutral-200">Email</label>
                    <input type="email" id="email" name="email" class="h-12 w-full rounded-2xl border border-white/10 bg-neutral-900/90 px-4 text-white outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20" placeholder="admin@logitrack.com" required>
                </div>
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium text-neutral-200">Contraseña</label>
                    <input type="password" id="password" name="password" class="h-12 w-full rounded-2xl border border-white/10 bg-neutral-900/90 px-4 text-white outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20" placeholder="Tu contraseña" required>
                </div>
                <div id="form-feedback" class="hidden rounded-2xl border px-4 py-3 text-sm"></div>
                <div class="pt-2">
                    <input id="submit-button" type="submit" value="Login" class="h-12 w-full cursor-pointer rounded-2xl bg-emerald-400 font-bold text-neutral-950 transition hover:bg-emerald-300">
                </div>
                </div>
            </form>
            <p class="mt-6 text-sm text-neutral-300">¿No tienes cuenta? Registrate <a href="/register.html" class="font-semibold text-emerald-300 transition hover:text-emerald-200">aquí</a>.</p>
            </div>
        </section>
        <aside class="relative hidden h-full min-h-[36rem] lg:block">
            <img src="https://raw.githubusercontent.com/Duran24062005/educonnect-nextjs-fastapi/refs/heads/main/public/assets/img/Fondo2.jpg" alt="Warehouse background" class="h-full w-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/30 via-black/30 to-black/70"></div>
            <div class="absolute inset-x-0 bottom-0 p-8">
                <p class="max-w-xs text-sm leading-6 text-white/85">Controla entradas, salidas y transferencias desde un solo panel operativo.</p>
            </div>
        </aside>
        </div>
    </main>
</body>
<script src="/js/auth.js"></script>
</html>
