<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiTrack | Perfil</title>
  <script src="../js/core/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/app.css">
</head>
<body class="page-bg min-h-screen text-ink">
  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <div class="app-shell">
      <aside class="section-card p-5">
        <img
          src="../img/appLogo_backgroundless.png"
          alt="Logo de LogiTrack"
          class="h-24 w-auto lg:h-[8.5rem]"
        >
        <p class="mt-3 text-xs uppercase tracking-[0.35em] text-slate-500">LogiTrack</p>
        <h1 class="mt-3 font-display text-3xl">Perfil</h1>
        <nav class="mt-6 space-y-2 text-sm font-medium">
          <a class="nav-link" data-nav="system" href="./system.html">Resumen</a>
          <a class="nav-link" data-nav="products" href="./products.html">Productos</a>
          <a class="nav-link" data-nav="warehouses" href="./warehouses.html">Bodegas</a>
          <a class="nav-link" data-nav="movements" href="./movements.html">Movimientos</a>
          <a class="nav-link" data-nav="profile" href="./profile.html">Perfil</a>
          <a class="nav-link" data-nav="admin" data-admin-only href="./admin.html">Administracion</a>
        </nav>
        <div class="mt-8 rounded-2xl bg-mist/70 p-4 text-sm">
          <p class="font-semibold">API actual</p>
          <p class="js-api-base mt-2 break-all text-slate-600"></p>
          <button class="btn-secondary mt-4 w-full" data-action="logout" type="button">Cerrar sesion</button>
        </div>
      </aside>

      <section class="space-y-6">
        <header class="section-card p-6">
          <h2 class="section-title">Mi perfil</h2>
          <p class="mt-3 text-sm text-slate-600">Aqui ves los datos del usuario autenticado y puedes cambiar la contrasena.</p>
        </header>

        <div id="profile-notice" class="hidden"></div>

        <section class="grid gap-6 xl:grid-cols-2">
          <article class="section-card p-6">
            <h3 class="text-xl font-semibold">Datos actuales</h3>
            <dl class="mt-5 space-y-4 text-sm">
              <div>
                <dt class="text-slate-500">Nombre</dt>
                <dd id="profile-name" class="mt-1 font-medium"></dd>
              </div>
              <div>
                <dt class="text-slate-500">Correo</dt>
                <dd id="profile-email" class="mt-1 font-medium"></dd>
              </div>
              <div>
                <dt class="text-slate-500">Telefono</dt>
                <dd id="profile-phone" class="mt-1 font-medium"></dd>
              </div>
              <div>
                <dt class="text-slate-500">Rol</dt>
                <dd id="profile-role" class="mt-1 font-medium"></dd>
              </div>
              <div>
                <dt class="text-slate-500">Estado</dt>
                <dd id="profile-status" class="mt-1 font-medium"></dd>
              </div>
            </dl>
          </article>

          <article class="section-card p-6">
            <h3 class="text-xl font-semibold">Cambiar contrasena</h3>
            <form id="profile-form" class="mt-5 space-y-4">
              <div>
                <label class="mb-2 block text-sm font-medium">Contrasena actual</label>
                <input class="input-shell" type="password" name="currentPassword" minlength="6" required>
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium">Nueva contrasena</label>
                <input class="input-shell" type="password" name="newPassword" minlength="6" required>
              </div>
              <button class="btn-primary w-full" type="submit">Actualizar contrasena</button>
            </form>
          </article>
        </section>
      </section>
    </div>
  </main>

  <script type="module" src="../js/pages/profile-page.js"></script>
</body>
</html>
